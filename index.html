<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Реєстрація</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface2: #f7f9fc;
      --accent: #2563eb;
      --accent-glow: rgba(37,99,235,0.12);
      --accent2: #0891b2;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #dde3ee;
      --border-focus: rgba(37,99,235,0.5);
      --error: #ef4444;
      --success: #10b981;
    }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      padding-left: max(16px, env(safe-area-inset-left));
      padding-right: max(16px, env(safe-area-inset-right));
      position: relative;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* Subtle light background pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 700px 500px at 10% 10%, rgba(37,99,235,0.05) 0%, transparent 70%),
        radial-gradient(ellipse 500px 700px at 90% 90%, rgba(8,145,178,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .grid-overlay {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(37,99,235,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(37,99,235,0.08);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 20px;
    }

    .header-badge::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--accent2);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent2);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }

    .header h1 {
      font-family: 'Unbounded', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      background: linear-gradient(135deg, #1e293b 0%, #2563eb 60%, #0891b2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .header p {
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.6;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow:
        0 0 0 1px rgba(37,99,235,0.06) inset,
        0 20px 60px rgba(37,99,235,0.08),
        0 4px 16px rgba(0,0,0,0.06);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
      opacity: 0.6;
    }

    /* Section title */
    .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 24px 0 16px;
    }

    .section-label:first-child { margin-top: 0; }

    .section-label::before {
      content: '';
      width: 16px; height: 1px;
      background: var(--accent);
    }

    .section-label::after {
      content: '';
      flex: 1; height: 1px;
      background: var(--border);
    }

    /* Field */
    .field { margin-bottom: 14px; position: relative; }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
    }

    .field label .req {
      color: var(--accent);
      margin-left: 2px;
    }

    .input-wrap { position: relative; }

    .field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 14px 13px 42px;
      min-height: 48px;
      font-family: 'Raleway', sans-serif;
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      -webkit-appearance: none;
      appearance: none;
      touch-action: manipulation;
    }

    .field input::placeholder { color: #aab4c4; }

    .field input:focus {
      border-color: var(--border-focus);
      background: rgba(59,130,246,0.05);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .field input:valid:not(:placeholder-shown) {
      border-color: rgba(52, 211, 153, 0.4);
    }

    .field-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      pointer-events: none;
      opacity: 0.7;
    }

    /* Row */
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Submit */
    .submit-btn {
      width: 100%;
      margin-top: 20px;
      padding: 12px 20px;
      min-height: 44px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      border: none;
      border-radius: 10px;
      font-family: 'Raleway', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #fff;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(59,130,246,0.4);
      touch-action: manipulation;
      -webkit-appearance: none;
      appearance: none;
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 32px rgba(59,130,246,0.5);
    }

    .submit-btn:active { transform: translateY(0); }

    .submit-btn[disabled] {
      opacity: 0.7;
      cursor: wait;
      transform: none;
      box-shadow: 0 4px 20px rgba(59,130,246,0.25);
    }

    /* Error message */
    .status-message {
      display: none;
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.5;
    }

    .status-message.show { display: block; }
    .status-message.error {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #b91c1c;
    }

    /* Success overlay */
    .success-overlay {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 48px 24px;
      text-align: center;
      animation: fadeUp 0.5s ease both;
    }

    .success-overlay.show { display: flex; }
    .form-content.hide { display: none; }

    .success-icon {
      width: 72px; height: 72px;
      background: rgba(52, 211, 153, 0.1);
      border: 2px solid var(--success);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      box-shadow: 0 0 32px rgba(52,211,153,0.3);
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .success-overlay h2 {
      font-family: 'Unbounded', sans-serif;
      font-size: 20px;
      color: #10b981;
    }

    .success-overlay p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: #031124;
      letter-spacing: 0.05em;
    }

    @media (max-width: 600px) {
      .card { padding: 20px 16px; }
      .header h1 { font-size: 22px; }
      .header { margin-bottom: 20px; }
      .row { grid-template-columns: 1fr; }
      .field input { font-size: 16px; }
      .submit-btn { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="grid-overlay"></div>
  <div class="container">
    <div class="header">
      <p>Заповніть форму, щоб завершити налаштування вашого акаунту</p>
    </div>

    <div class="card">
      <!-- Success state -->
      <div class="success-overlay" id="successOverlay">
        <div class="success-icon">✓</div>
        <h2>Дякуємо!</h2>
        <p>Ваші дані успішно збережено.<br>Тепер ви можете користуватися ботом.</p>
      </div>

      <!-- Form -->
      <div class="form-content" id="formContent">
        <div class="section-label">Особисті дані</div>

        <div class="field">
          <label>Прізвище <span class="req">*</span></label>
          <div class="input-wrap">
            <span class="field-icon">👤</span>
            <input type="text" id="lastName" placeholder="Шевченко" required />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Ім'я <span class="req">*</span></label>
            <div class="input-wrap">
              <span class="field-icon">✏️</span>
              <input type="text" id="firstName" placeholder="Володимир" required />
            </div>
          </div>
          <div class="field">
            <label>По батькові</label>
            <div class="input-wrap">
              <span class="field-icon">✏️</span>
              <input type="text" id="middleName" placeholder="Володимирович" />
            </div>
          </div>
        </div>

        <div class="section-label">Робоче місце</div>

        <div class="field">
          <label>Посада <span class="req">*</span></label>
          <div class="input-wrap">
            <span class="field-icon">💼</span>
            <input type="text" id="position" placeholder="Менеджер / Інженер..." required />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Відділ</label>
            <div class="input-wrap">
              <span class="field-icon">🏢</span>
              <input type="text" id="department" placeholder="Назва відділу" />
            </div>
          </div>
          <div class="field">
            <label>Місто</label>
            <div class="input-wrap">
              <span class="field-icon">🏙️</span>
              <input type="text" id="city" placeholder="Київ" />
            </div>
          </div>
        </div>

        <div class="section-label">Контакти</div>

        <div class="field">
          <label>Номер телефону <span class="req">*</span></label>
          <div class="input-wrap">
            <span class="field-icon">📞</span>
            <input type="tel" id="phone" placeholder="+380 XX XXX XX XX" required />
          </div>
        </div>

        <div class="field">
          <label>Email</label>
          <div class="input-wrap">
            <span class="field-icon">📧</span>
            <input type="email" id="email" placeholder="volodymyr@company.com" />
          </div>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">
          Зберегти профіль <span>→</span>
        </button>

        <div class="status-message error" id="statusMessage"></div>
      </div>
    </div>

    <div class="footer">VLAS PRO vlaspro.com.ua@gmail.com</div>
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

    if (tg) {
      tg.ready();
      tg.expand();
    }

    function setFieldError(el) {
      el.style.borderColor = 'var(--error)';
      el.style.boxShadow = '0 0 0 3px rgba(248,113,113,0.2)';
      el.addEventListener('input', () => {
        el.style.borderColor = '';
        el.style.boxShadow = '';
      }, { once: true });
    }

    function showStatus(message) {
      const status = document.getElementById('statusMessage');
      status.textContent = message;
      status.classList.add('show');
    }

    function hideStatus() {
      const status = document.getElementById('statusMessage');
      status.textContent = '';
      status.classList.remove('show');
    }

    function showSuccess() {
      document.getElementById('formContent').classList.add('hide');
      document.getElementById('successOverlay').classList.add('show');
    }

    function handleSubmit() {
      hideStatus();

      const submitBtn = document.getElementById('submitBtn');
      const lastName  = document.getElementById('lastName').value.trim();
      const firstName = document.getElementById('firstName').value.trim();
      const position  = document.getElementById('position').value.trim();
      const phone     = document.getElementById('phone').value.trim();

      if (!lastName || !firstName || !position || !phone) {
        ['lastName','firstName','position','phone'].forEach(id => {
          const el = document.getElementById(id);
          if (!el.value.trim()) {
            setFieldError(el);
          }
        });
        showStatus('Будь ласка, заповніть усі обовʼязкові поля.');
        return;
      }

      const payload = {
        name: 'USER_REGISTRATION',
        params: {
          lastname: lastName,
          firstname: firstName,
          middlename: document.getElementById('middleName').value.trim(),
          position: position,
          department: document.getElementById('department').value.trim(),
          city: document.getElementById('city').value.trim(),
          phone: phone,
          email: document.getElementById('email').value.trim()
        }
      };

      if (!tg) {
        console.error('Telegram WebApp SDK недоступний');
        showStatus('Цю форму потрібно відкривати всередині Telegram-бота.');
        return;
      }

      try {
        submitBtn.disabled = true;
        tg.sendData(JSON.stringify(payload));
        showSuccess();
        setTimeout(() => {
          tg.close();
        }, 300);
      } catch (error) {
        console.error('Помилка відправлення в Telegram:', error);
        submitBtn.disabled = false;
        showStatus('Не вдалося передати дані в Telegram. Спробуйте ще раз.');
      }
    }
  </script>
</body>
</html>
